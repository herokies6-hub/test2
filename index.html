<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>설문조사 시작</title>
  <style>
    body {
      font-family: Arial;
      padding: 30px;
    }
    .box {
      max-width: 400px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="box" id="languageSelection">
  <h2>언어 선택</h2>
  <label for="language">언어를 선택하세요:</label>
  <select id="language" onchange="changeLanguage()">
    <option value="ko">한국어</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
  </select>
  <button onclick="startSurvey()">시작</button>
</div>

<div class="box" id="survey" style="display: none;">
  <h2 id="surveyTitle">행사 만족도 설문</h2>

  <!-- 나이 -->
  <label id="ageLabel">나이</label>
  <input type="number" id="age" placeholder="나이 입력">

  <!-- 성별 -->
  <label id="genderLabel">성별</label>
  <select id="gender">
    <option value="">선택하세요</option>
    <option value="남">남</option>
    <option value="여">여</option>
  </select>

  <!-- 만족도 -->
  <label id="scoreLabel">만족도 (1~5점)</label>
  <input type="range" id="score" min="1" max="5">
  <span id="scoreValue">3</span>

  <!-- 제출 -->
  <button onclick="submitForm()"><span id="submitBtn">제출</span></button>

  <p id="result"></p>
</div>

<script>
  let selectedLang = 'ko'; // 기본 언어 설정

  function changeLanguage() {
    selectedLang = document.getElementById("language").value;
  }

  function startSurvey() {
    document.getElementById("languageSelection").style.display = "none";
    document.getElementById("survey").style.display = "block";
    
    updateSurveyText();
  }

  function updateSurveyText() {
    const translations = {
      ko: {
        title: "행사 만족도 설문",
        ageLabel: "나이",
        genderLabel: "성별",
        scoreLabel: "만족도 (1~5점)",
        submitBtn: "제출",
        result: "제출됨 👉 나이: {age}, 성별: {gender}, 만족도: {score}"
      },
      en: {
        title: "Event Satisfaction Survey",
        ageLabel: "Age",
        genderLabel: "Gender",
        scoreLabel: "Satisfaction (1-5)",
        submitBtn: "Submit",
        result: "Submitted 👉 Age: {age}, Gender: {gender}, Satisfaction: {score}"
      },
      fr: {
        title: "Sondage de Satisfaction d'Événement",
        ageLabel: "Âge",
        genderLabel: "Genre",
        scoreLabel: "Satisfaction (1-5)",
        submitBtn: "Soumettre",
        result: "Soumis 👉 Âge: {age}, Genre: {gender}, Satisfaction: {score}"
      }
    };

    const selectedText = translations[selectedLang];
    document.getElementById("surveyTitle").innerText = selectedText.title;
    document.getElementById("ageLabel").innerText = selectedText.ageLabel;
    document.getElementById("genderLabel").innerText = selectedText.genderLabel;
    document.getElementById("scoreLabel").innerText = selectedText.scoreLabel;
    document.getElementById("submitBtn").innerText = selectedText.submitBtn;
  }

  const score = document.getElementById("score");
  const scoreValue = document.getElementById("scoreValue");

  score.addEventListener("input", () => {
    scoreValue.innerText = score.value;
  });

  function submitForm() {
    const age = document.getElementById("age").value;
    const gender = document.getElementById("gender").value;
    const score = document.getElementById("score").value;

    const translations = {
      ko: "제출됨 👉 나이: {age}, 성별: {gender}, 만족도: {score}",
      en: "Submitted 👉 Age: {age}, Gender: {gender}, Satisfaction: {score}",
      fr: "Soumis 👉 Âge: {age}, Genre: {gender}, Satisfaction: {score}"
    };

    const resultText = translations[selectedLang]
      .replace("{age}", age)
      .replace("{gender}", gender)
      .replace("{score}", score);

    document.getElementById("result").innerText = resultText;
  }
</script>

</body>
</html>
